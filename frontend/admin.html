<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — She Can Foundation</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{--orange:#E84B1A;--orange-l:#F26B3A;--dark:#0F0A07;--dark2:#1A0F09;--white:#fff;--muted:rgba(255,255,255,.5);--border:rgba(255,255,255,.08)}
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:var(--dark);color:var(--white);min-height:100vh}
    a{text-decoration:none;color:inherit}

    /* LOGIN */
    #loginPage{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(232,75,26,.12) 0%,transparent 70%),var(--dark)}
    .login-box{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:20px;padding:44px 40px;width:100%;max-width:400px}
    .login-box h1{font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:6px}
    .login-box h1 em{color:var(--orange-l);font-style:italic}
    .login-box p{color:var(--muted);font-size:.88rem;margin-bottom:28px}
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .fg label{font-size:.7rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.4)}
    .fg input{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;padding:12px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;outline:none;transition:.2s}
    .fg input:focus{border-color:var(--orange);box-shadow:0 0 0 3px rgba(232,75,26,.14)}
    .fg input::placeholder{color:rgba(255,255,255,.2)}
    .btn{width:100%;background:var(--orange);color:#fff;border:none;cursor:pointer;padding:13px;border-radius:50px;font-family:'DM Sans',sans-serif;font-size:.95rem;font-weight:600;transition:.2s;margin-top:6px}
    .btn:hover{background:var(--orange-l)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .login-err{color:#f87171;font-size:.82rem;margin-top:10px;text-align:center;min-height:18px}

    /* ADMIN SHELL */
    #adminPage{display:none}
    header{background:rgba(8,5,3,.95);border-bottom:1px solid rgba(232,75,26,.15);padding:14px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .header-brand{font-family:'Playfair Display',serif;font-size:1.1rem}
    .header-brand em{color:var(--orange-l);font-style:italic}
    .header-right{display:flex;align-items:center;gap:16px}
    .badge{background:rgba(232,75,26,.15);border:1px solid rgba(232,75,26,.3);color:var(--orange-l);padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600}
    .logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;transition:.2s}
    .logout-btn:hover{border-color:var(--orange);color:#fff}

    main{max-width:1200px;margin:0 auto;padding:40px}

    /* STATS ROW */
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px}
    .stat{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:14px;padding:22px 20px}
    .stat strong{display:block;font-family:'Playfair Display',serif;font-size:2rem;color:var(--orange-l)}
    .stat span{font-size:.8rem;color:var(--muted)}

    /* FILTERS */
    .filters{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
    .filter-btn{background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);padding:7px 18px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:.82rem;transition:.2s}
    .filter-btn:hover,.filter-btn.active{background:var(--orange);border-color:var(--orange);color:#fff}
    .search-box{margin-left:auto;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:9px;padding:8px 14px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.85rem;outline:none;width:220px;transition:.2s}
    .search-box:focus{border-color:var(--orange)}
    .search-box::placeholder{color:rgba(255,255,255,.2)}

    /* TABLE */
    .table-wrap{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:16px;overflow:hidden}
    table{width:100%;border-collapse:collapse}
    thead{background:rgba(232,75,26,.08)}
    th{padding:13px 16px;text-align:left;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);border-bottom:1px solid var(--border)}
    td{padding:14px 16px;font-size:.88rem;color:rgba(255,255,255,.75);border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(255,255,255,.02)}

    .status-badge{display:inline-block;padding:3px 12px;border-radius:20px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
    .status-pending{background:rgba(234,179,8,.15);color:#fbbf24}
    .status-approved{background:rgba(22,163,74,.15);color:#4ade80}
    .status-rejected{background:rgba(239,68,68,.15);color:#f87171}

    .action-btns{display:flex;gap:6px}
    .act{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:.75rem;font-family:'DM Sans',sans-serif;transition:.2s}
    .act:hover{border-color:var(--orange);color:#fff}
    .act.approve:hover{border-color:#4ade80;color:#4ade80}
    .act.reject:hover{border-color:#f87171;color:#f87171}
    .act.del:hover{border-color:#f87171;background:rgba(239,68,68,.1);color:#f87171}

    .empty{text-align:center;padding:60px 20px;color:var(--muted);font-size:.9rem}

    /* MODAL */
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:50;align-items:center;justify-content:center}
    .modal-bg.open{display:flex}
    .modal{background:#1a0f09;border:1px solid rgba(232,75,26,.2);border-radius:20px;padding:36px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto}
    .modal h3{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:20px}
    .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
    .modal-field label{font-size:.68rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--orange);display:block;margin-bottom:4px}
    .modal-field p{font-size:.9rem;color:rgba(255,255,255,.8)}
    .modal-close{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:20px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:20px;transition:.2s}
    .modal-close:hover{border-color:var(--orange);color:#fff}
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-box">
    <h1>Admin <em>Panel</em></h1>
    <p>She Can Foundation · Volunteer Management</p>
    <div class="fg"><label>Username</label><input type="text" id="username" placeholder="admin" /></div>
    <div class="fg"><label>Password</label><input type="password" id="password" placeholder="••••••••" /></div>
    <button class="btn" id="loginBtn" onclick="login()">Login →</button>
    <p class="login-err" id="loginErr"></p>
  </div>
</div>

<!-- ADMIN -->
<div id="adminPage">
  <header>
    <span class="header-brand">She Can <em>Foundation</em> · Admin</span>
    <div class="header-right">
      <span class="badge" id="adminBadge">admin</span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat"><strong id="s-total">—</strong><span>Total Applications</span></div>
      <div class="stat"><strong id="s-pending">—</strong><span>Pending Review</span></div>
      <div class="stat"><strong id="s-approved">—</strong><span>Approved</span></div>
      <div class="stat"><strong id="s-rejected">—</strong><span>Rejected</span></div>
    </div>

    <!-- Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
      <button class="filter-btn" onclick="setFilter('approved',this)">Approved</button>
      <button class="filter-btn" onclick="setFilter('rejected',this)">Rejected</button>
      <input class="search-box" type="text" placeholder="Search name or email..." oninput="renderTable()" id="searchBox" />
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Email</th>
            <th>Interest</th>
            <th>City</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="modalBg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <h3>Application Detail</h3>
    <div class="modal-row">
      <div class="modal-field"><label>First Name</label><p id="m-first"></p></div>
      <div class="modal-field"><label>Last Name</label><p id="m-last"></p></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Email</label><p id="m-email"></p></div>
      <div class="modal-field"><label>Phone</label><p id="m-phone"></p></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>Interest</label><p id="m-interest"></p></div>
      <div class="modal-field"><label>Availability</label><p id="m-avail"></p></div>
    </div>
    <div class="modal-row">
      <div class="modal-field"><label>City</label><p id="m-city"></p></div>
      <div class="modal-field"><label>Applied On</label><p id="m-date"></p></div>
    </div>
    <div class="modal-field" style="margin-top:4px"><label>Message</label><p id="m-msg" style="line-height:1.7;color:rgba(255,255,255,.6)"></p></div>
    <button class="modal-close" onclick="document.getElementById('modalBg').classList.remove('open')">Close</button>
  </div>
</div>

<script>
  const API = 'https://shecan-backend-jt82.onrender.com';
  let token = localStorage.getItem('scf_token') || '';
  let allData = [];
  let currentFilter = 'all';

  // Auto-login if token exists
  if (token) showAdmin();

  async function login() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginErr');
    if (!u || !p) { err.textContent = 'Enter username and password.'; return; }
    btn.textContent = 'Logging in...'; btn.disabled = true; err.textContent = '';

    try {
      const res = await fetch(`${API}/api/admin/login`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ username: u, password: p })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      token = data.token;
      localStorage.setItem('scf_token', token);
      document.getElementById('adminBadge').textContent = u;
      showAdmin();
    } catch(e) {
      err.textContent = e.message;
      btn.textContent = 'Login →'; btn.disabled = false;
    }
  }

  // Allow Enter key on login
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('loginPage').style.display !== 'none') login();
  });

  function showAdmin() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    loadApplications();
  }

  async function loadApplications() {
    try {
      const res = await fetch(`${API}/api/applications`, {
        headers: { 'x-admin-token': token }
      });
      if (res.status === 401) { logout(); return; }
      const data = await res.json();
      allData = data.applications || [];
      updateStats();
      renderTable();
    } catch {
      // fallback mock data so UI is visible without backend
      allData = [
        {id:1,first_name:'Priya',last_name:'Sharma',email:'priya@example.com',phone:'+91 98765 43210',interest:'Education & Scholarships',availability:'Weekends',city:'Mumbai',message:'I want to help girls get access to education.',status:'pending',created_at:'2025-05-20 10:30:00'},
        {id:2,first_name:'Anita',last_name:'Rao',email:'anita@example.com',phone:'+91 87654 32109',interest:'Health & Wellness',availability:'Flexible',city:'Pune',message:'I am a nurse and want to contribute.',status:'approved',created_at:'2025-05-21 14:00:00'},
        {id:3,first_name:'Sunita',last_name:'Verma',email:'sunita@example.com',phone:'',interest:'Leadership Development',availability:'Weekdays',city:'Delhi',message:'',status:'rejected',created_at:'2025-05-22 09:15:00'},
      ];
      updateStats(); renderTable();
    }
  }

  function updateStats() {
    document.getElementById('s-total').textContent    = allData.length;
    document.getElementById('s-pending').textContent  = allData.filter(r=>r.status==='pending').length;
    document.getElementById('s-approved').textContent = allData.filter(r=>r.status==='approved').length;
    document.getElementById('s-rejected').textContent = allData.filter(r=>r.status==='rejected').length;
  }

  function setFilter(f, el) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    el.classList.add('active');
    renderTable();
  }

  function renderTable() {
    const q = document.getElementById('searchBox').value.toLowerCase();
    let rows = allData.filter(r => {
      const matchFilter = currentFilter === 'all' || r.status === currentFilter;
      const matchSearch = !q || `${r.first_name} ${r.last_name} ${r.email}`.toLowerCase().includes(q);
      return matchFilter && matchSearch;
    });

    const tbody = document.getElementById('tableBody');
    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty">No applications found.</td></tr>`;
      return;
    }

    tbody.innerHTML = rows.map(r => `
      <tr>
        <td style="color:var(--muted)">#${r.id}</td>
        <td><strong>${r.first_name} ${r.last_name}</strong></td>
        <td style="color:var(--muted)">${r.email}</td>
        <td>${r.interest}</td>
        <td>${r.city || '—'}</td>
        <td style="color:var(--muted)">${r.created_at.slice(0,10)}</td>
        <td><span class="status-badge status-${r.status}">${r.status}</span></td>
        <td>
          <div class="action-btns">
            <button class="act" onclick="viewDetail(${r.id})">View</button>
            ${r.status !== 'approved' ? `<button class="act approve" onclick="updateStatus(${r.id},'approved')">✓</button>` : ''}
            ${r.status !== 'rejected' ? `<button class="act reject" onclick="updateStatus(${r.id},'rejected')">✗</button>` : ''}
            <button class="act del" onclick="deleteApp(${r.id})">Del</button>
          </div>
        </td>
      </tr>
    `).join('');
  }

  async function updateStatus(id, status) {
    try {
      await fetch(`${API}/api/applications/${id}`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json','x-admin-token':token},
        body: JSON.stringify({ status })
      });
    } catch {}
    const row = allData.find(r => r.id === id);
    if (row) row.status = status;
    updateStats(); renderTable();
  }

  async function deleteApp(id) {
    if (!confirm('Delete this application?')) return;
    try {
      await fetch(`${API}/api/applications/${id}`, {
        method: 'DELETE', headers: {'x-admin-token': token}
      });
    } catch {}
    allData = allData.filter(r => r.id !== id);
    updateStats(); renderTable();
  }

  function viewDetail(id) {
    const r = allData.find(r => r.id === id);
    if (!r) return;
    document.getElementById('m-first').textContent   = r.first_name;
    document.getElementById('m-last').textContent    = r.last_name;
    document.getElementById('m-email').textContent   = r.email;
    document.getElementById('m-phone').textContent   = r.phone || '—';
    document.getElementById('m-interest').textContent= r.interest;
    document.getElementById('m-avail').textContent   = r.availability || '—';
    document.getElementById('m-city').textContent    = r.city || '—';
    document.getElementById('m-date').textContent    = r.created_at.slice(0,10);
    document.getElementById('m-msg').textContent     = r.message || 'No message provided.';
    document.getElementById('modalBg').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalBg'))
      document.getElementById('modalBg').classList.remove('open');
  }

  async function logout() {
    try {
      await fetch(`${API}/api/admin/logout`, {
        method:'POST', headers:{'x-admin-token':token}
      });
    } catch {}
    token = '';
    localStorage.removeItem('scf_token');
    document.getElementById('adminPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('loginErr').textContent = '';
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
  }
</script>
</body>
</html>
